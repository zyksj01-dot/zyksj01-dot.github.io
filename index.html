<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ztq made</title>
  <meta name="description" content="ztq — Reborn At 36. Exploring AI, real estate &amp; rebuilding from scratch.">
  <meta property="og:title" content="ztq">
  <meta property="og:description" content="Reborn At 36. Exploring AI, real estate &amp; rebuilding.">
  <meta property="og:url" content="https://ztq.uk/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="ztq">
  <meta name="twitter:description" content="Reborn At 36.">
  <meta name="theme-color" content="#0e1117">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230e1117'/><text x='50' y='72' font-size='62' text-anchor='middle' font-family='monospace' fill='%2358a6ff'>z</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0e1117;
      --surface:  #161b22;
      --surface2: #1c2128;
      --border:   #30363d;
      --border-bright: #3d444d;
      --green:    #3fb950;
      --blue:     #58a6ff;
      --purple:   #c292ff;
      --muted:    #6e7681;
      --text:     #c9d1d9;
      --bright:   #f0f6fc;
      --red:      #ff7b72;
      --yellow:   #d29922;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* ─── DOT MATRIX BACKGROUND ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #30363d 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.28;
      pointer-events: none;
      z-index: 0;
    }

    /* Vignette over dot matrix */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, var(--bg) 100%);
      pointer-events: none;
      z-index: 0;
    }

    nav, main, footer { position: relative; z-index: 1; }

    /* ─── NAV ─── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 3rem;
      border-bottom: 1px solid transparent;
      background: linear-gradient(to bottom, var(--bg), transparent);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    nav::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-bright) 20%, var(--blue) 50%, var(--border-bright) 80%, transparent);
      opacity: 0.45;
    }

    .nav-left {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .nav-left span { color: var(--blue); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .nav-badge {
      font-size: 0.72rem;
      color: var(--green);
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 0.3rem 0.75rem;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .nav-badge::before { content: '>'; }
    .nav-badge:hover {
      border-color: var(--green);
      box-shadow: 0 0 8px rgba(63,185,80,0.15);
    }

    /* Status indicator */
    .nav-status {
      font-size: 0.68rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.35rem;
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 0.3rem 0.75rem;
      border-radius: 4px;
    }
    .nav-status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--blue);
      animation: pulse 2.4s ease-in-out infinite;
      flex-shrink: 0;
    }

    /* ─── MAIN ─── */
    main {
      flex: 1;
      padding: 4rem 3rem 3rem;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    /* ─── HERO ─── */
    .hero { display: flex; flex-direction: column; gap: 1rem; }

    .hero-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      animation: fadeup 0.6s ease 0.1s forwards;
    }

    .dollar {
      font-size: clamp(2rem, 5.5vw, 3.8rem);
      font-weight: 300;
      color: var(--blue);
      line-height: 1;
      user-select: none;
      opacity: 0.85;
      letter-spacing: -0.03em;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.8rem);
      font-weight: 700;
      line-height: 1;
      color: var(--bright);
      letter-spacing: -0.02em;
    }

    h1 .blue { color: var(--blue); }

    .zh {
      font-family: 'SimSun', '宋体', 'NSimSun', serif;
      font-weight: 400;
      letter-spacing: 0.05em;
    }

    .title-underscore { color: var(--muted); }

    .define {
      color: var(--purple);
      font-weight: 300;
      font-size: 0.45em;
      letter-spacing: 0.05em;
      vertical-align: middle;
      margin-right: 0.3em;
      opacity: 0.85;
    }

    .title-cursor {
      display: inline-block;
      width: 0.45em;
      height: 0.85em;
      background: var(--green);
      vertical-align: baseline;
      position: relative;
      top: 0.08em;
      margin-left: 0.08em;
      border-radius: 2px;
      animation: blink 1.1s step-end infinite;
    }

    .hero-sub {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      opacity: 0;
      animation: fadeup 0.6s ease 0.25s forwards;
    }

    .hero-sub::before {
      content: '';
      display: block;
      width: 3px;
      height: 1.4em;
      background: linear-gradient(to bottom, var(--purple), var(--blue));
      border-radius: 2px;
      flex-shrink: 0;
    }

    .hero-sub p {
      font-family: 'Inter', sans-serif;
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: var(--muted);
      font-style: italic;
      font-weight: 300;
      letter-spacing: 0.01em;
    }

    /* ─── DIVIDER ─── */
    hr {
      border: none;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-bright) 30%, var(--border-bright) 70%, transparent);
      opacity: 0;
      animation: fadeup 0.5s ease 0.4s forwards;
      margin-top: calc(-3rem + 0.6rem);
    }

    /* ─── CONNECT ─── */
    .connect {
      opacity: 0;
      animation: fadeup 0.6s ease 0.85s forwards;
    }

    .section-label {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-label::before { content: '>'; }

    .link-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.1rem;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      text-decoration: none;
      border-radius: 6px;
      transition: border-color 0.2s, color 0.2s, background 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
      will-change: transform;
    }

    .link-btn .bracket { color: var(--blue); transition: color 0.2s; }

    .link-btn:hover {
      border-color: var(--blue);
      color: var(--bright);
      background: var(--surface2);
      box-shadow: 0 0 14px rgba(88,166,255,0.12), inset 0 0 0 1px rgba(88,166,255,0.05);
    }

    .link-btn .arrow {
      transition: transform 0.2s;
      color: var(--muted);
      font-size: 0.85em;
    }

    .link-btn:hover .arrow {
      transform: translateX(4px);
      color: var(--blue);
    }

    /* ─── TERMINAL ─── */
    .terminal-wrap {
      opacity: 0;
      animation: fadeup 0.6s ease 0.65s forwards;
    }

    .terminal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .terminal:hover {
      border-color: var(--border-bright);
      box-shadow: 0 0 24px rgba(88,166,255,0.06);
    }

    .term-bar {
      display: flex;
      align-items: center;
      padding: 0.75rem 1rem;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .term-dots { display: flex; gap: 6px; }
    .term-dot { width: 12px; height: 12px; border-radius: 50%; transition: filter 0.2s; }
    .td-r { background: #ff5f57; }
    .td-y { background: #febc2e; }
    .td-g { background: #28c840; }
    .terminal:hover .term-dot { filter: brightness(1.15); }

    .term-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      color: var(--muted);
    }

    .term-body {
      padding: 1.4rem 1.6rem;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .tline {
      font-size: 0.82rem;
      line-height: 1.8;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .tline.cursor-line {
      display: flex;
      align-items: center;
    }

    .tline.empty { min-height: 0.9em; }

    .prompt { color: var(--green); margin-right: 0.5rem; }
    .cmd-text { color: var(--bright); font-weight: 500; }
    .out-text { color: var(--text); }

    /* ─── INPUT LINE ─── */
    .input-line {
      display: flex;
      align-items: center;
      font-size: 0.82rem;
      line-height: 1.8;
      margin-top: 0;
    }

    .term-input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--bright);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      caret-color: var(--green);
      width: 100%;
      flex: 1;
    }

    /* Shake animation for wrong input */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    .terminal.shake {
      animation: shake 0.4s ease;
    }

    /* ─── HELP OUTPUT ─── */
    .help-grid {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 0 1.2rem;
      margin-top: 0.2rem;
    }
    .help-cmd { color: var(--blue); font-weight: 500; }
    .help-desc { color: var(--muted); }

    /* ─── REDIRECT OVERLAY ─── */
    .redirect-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .redirect-overlay.active { opacity: 1; pointer-events: all; }

    .redirect-terminal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      width: min(480px, 90vw);
    }

    .redirect-bar {
      display: flex;
      align-items: center;
      padding: 0.75rem 1rem;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .redirect-body {
      padding: 1.4rem 1.6rem;
      display: flex;
      flex-direction: column;
      gap: 0;
      min-height: 120px;
    }

    .rline {
      font-size: 0.82rem;
      line-height: 1.8;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .rline .prompt { color: var(--green); margin-right: 0.5rem; }
    .rline .cmd-text { color: var(--bright); font-weight: 500; }
    .rline .out-text { color: var(--text); }
    .rline .green-text { color: var(--green); }

    /* ─── FOOTER ─── */
    footer {
      border-top: 1px solid transparent;
      position: relative;
      padding: 1.2rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0;
      animation: fadeup 0.5s ease 1.2s forwards;
      z-index: 1;
    }
    footer::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-bright) 30%, var(--border-bright) 70%, transparent);
      opacity: 0.45;
    }

    .foot-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .foot-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2.4s ease-in-out infinite;
    }

    footer .right { font-size: 0.72rem; color: var(--muted); }

    .typewriter { color: var(--muted); }
    .visitor-text { color: var(--purple); }

    /* ─── LIGHT THEME ─── */
    body.light {
      --bg:       #f5f0e8;
      --surface:  #ede8df;
      --surface2: #e2ddd4;
      --border:   #c8c3ba;
      --border-bright: #b0aba2;
      --green:    #1a7f37;
      --blue:     #0969da;
      --purple:   #8250df;
      --muted:    #6e7681;
      --text:     #24292f;
      --bright:   #1c2128;
      --red:      #cf222e;
      --yellow:   #9a6700;
    }

    body.light::before {
      background-image: radial-gradient(circle, #b0aba2 1px, transparent 1px);
      opacity: 0.35;
    }

    body.light::after {
      background: radial-gradient(ellipse at center, transparent 40%, var(--bg) 100%);
    }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeup {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadein { to { opacity: 1; } }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0; }
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.65); }
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 540px) {
      nav, footer { padding-left: 1.5rem; padding-right: 1.5rem; }
      main { padding: 2.5rem 1.5rem; }
      .nav-status { display: none; }
    }

    /* ─── REDUCED MOTION ─── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .title-cursor { animation: none; opacity: 1; }
      .nav-status-dot, .foot-dot { animation: none; opacity: 1; }
    }
  </style>
</head>

<script>
  // restore theme preference
  if (localStorage.getItem('ztq-theme') === 'light') document.body.classList.add('light');

  /* ═══════════════════════════════════════════════
     1. BOOT SCREEN  (first visit only per session)
  ═══════════════════════════════════════════════ */
  let _bootPlaying = false;

  (function () {
    // inject boot overlay
    const overlay = document.createElement('div');
    overlay.id = 'ztq-boot';
    overlay.style.cssText = [
      'position:fixed','inset:0','z-index:9999',
      'background:#0e1117',
      'display:flex','align-items:center','justify-content:center',
      'font-family:"JetBrains Mono",monospace',
      'font-size:clamp(0.68rem,1.5vw,0.84rem)',
      'padding:2rem',
    ].join(';');
    const inner = document.createElement('div');
    inner.style.cssText = 'width:min(520px,100%)';
    overlay.appendChild(inner);

    if (sessionStorage.getItem('ztq-booted')) {
      // already booted this session — don't show
      return;
    }
    sessionStorage.setItem('ztq-booted', '1');
    _bootPlaying = true;
    document.addEventListener('DOMContentLoaded', () => document.body.prepend(overlay));

    const C = { ok:'#3fb950', dim:'#6e7681', warn:'#d29922', hi:'#58a6ff', bright:'#f0f6fc' };
    const seq = [
      { t:0,    color:C.hi,    text:'ZTQ-OS v2.26.0 — Initializing...' },
      { t:180,  color:C.dim,   text:'Copyright (c) 2026 ztq. All rights reserved.' },
      { t:340,  color:C.dim,   text:' ' },
      { t:480,  color:C.ok,    text:'[  OK  ] Loading kernel modules...' },
      { t:640,  color:C.ok,    text:'[  OK  ] Mounting filesystems...' },
      { t:800,  color:C.ok,    text:'[  OK  ] Starting network interfaces...' },
      { t:980,  color:C.warn,  text:'[ WARN ] Memory fragmented — rebuilding from scratch' },
      { t:1160, color:C.ok,    text:'[  OK  ] Recovery mode: REBORN' },
      { t:1300, color:C.dim,   text:' ' },
      { t:1400, bar:true },
      { t:2180, color:C.dim,   text:' ' },
      { t:2260, color:C.bright, bold:true, text:'Welcome back, ztq.' },
      { t:2440, color:C.ok,    text:'System ready.' },
    ];

    seq.forEach(item => setTimeout(() => {
      const el = document.createElement('div');
      el.style.cssText = 'line-height:1.95;white-space:pre;';
      if (item.bar) {
        const TOTAL = 22; let filled = 0;
        el.style.color = C.ok;
        el.textContent = 'Booting  [' + '░'.repeat(TOTAL) + '] 0%';
        inner.appendChild(el);
        const iv = setInterval(() => {
          filled++;
          el.textContent = 'Booting  [' + '█'.repeat(filled) + '░'.repeat(TOTAL - filled) + '] ' + Math.round(filled/TOTAL*100) + '%';
          if (filled >= TOTAL) clearInterval(iv);
        }, 32);
      } else {
        el.style.color = item.color;
        if (item.bold) el.style.fontWeight = '700';
        el.textContent = item.text;
        inner.appendChild(el);
      }
    }, item.t));

    // fade out after sequence
    setTimeout(() => {
      overlay.style.transition = 'opacity 0.5s ease';
      overlay.style.opacity = '0';
      setTimeout(() => overlay.remove(), 520);
    }, 2900);
  })();

  /* ═══════════════════════════════════════════════
     2. VISITOR COUNTER
  ═══════════════════════════════════════════════ */
  const _visitors = (() => {
    try {
      // counts page loads on this device (not real unique visitors)
      if (sessionStorage.getItem('ztq-counted')) {
        return parseInt(localStorage.getItem('ztq-v'), 10) || 1;
      }
      sessionStorage.setItem('ztq-counted', '1');
      const n = (parseInt(localStorage.getItem('ztq-v'), 10) || 0) + 1;
      localStorage.setItem('ztq-v', String(n));
      return n;
    } catch { return 1; }
  })();

  /* ═══════════════════════════════════════════════
     3. COMMAND HISTORY
  ═══════════════════════════════════════════════ */
  const _history = [];
  let _histIdx = -1;

  /* ═══════════════════════════════════════════════
     4. TYPEWRITER HELPERS
  ═══════════════════════════════════════════════ */
  // type `text` into `span` character by character, call onDone when finished
  function typeInto(span, text, speed, onDone) {
    let i = 0;
    (function tick() {
      span.textContent = text.slice(0, ++i);
      if (i < text.length) setTimeout(tick, speed);
      else if (onDone) setTimeout(onDone, 50);
    })();
  }

  // type an array of [className, text] lines sequentially into container, before anchorNode
  function typeLines(entries, container, anchorNode, speed) {
    let i = 0;
    function next() {
      if (i >= entries.length) return;
      const [cls, text] = entries[i++];
      const row = document.createElement('div');
      row.className = 'tline';
      row.style.opacity = '1';
      const span = document.createElement('span');
      span.className = cls;
      row.appendChild(span);
      if (anchorNode && anchorNode.parentNode === container) {
        container.insertBefore(row, anchorNode);
      } else {
        container.appendChild(row);
      }
      container.scrollTop = container.scrollHeight;
      typeInto(span, text, speed, next);
    }
    next();
  }

  /* ═══════════════════════════════════════════════
     5. TERMINAL DATA
  ═══════════════════════════════════════════════ */
  const termLines = [
    { type: 'cmd', text: 'whoami' },
    { type: 'out', text: 'Ztq - exploring AI, rebuilding at 36.' },
    { type: 'empty' },
    { type: 'cmd', text: 'status' },
    { type: 'out', text: 'Currently: Reborn & learning.' },
    { type: 'out', text: 'Est. 2026 - Ongoing' },
    { type: 'empty' },
    { type: 'cmd', text: 'ls skills/' },
    { type: 'out', text: 'real-estate   archive   AI   rebuilding' },
    { type: 'empty' },
    { type: 'cursor' },
  ];

  const SECRET_URL = '#'; // TODO: set real URL if needed

  /* ═══════════════════════════════════════════════
     6. COMMANDS
  ═══════════════════════════════════════════════ */
  const COMMANDS = {
    whoami:       () => [['out-text', 'Ztq - exploring AI, rebuilding at 36.']],
    status:       () => [['out-text', 'Currently: Reborn & learning.'], ['out-text', 'Est. 2026 - Ongoing']],
    'ls skills/': () => [['out-text', 'real-estate   archive   AI   rebuilding']],
    ls:           () => [['out-text', 'skills/   links/   status/']],
    links:        () => [
      ['out-text', '片区经济测算  ->  https://ztq.uk/calculator.html'],
      ['out-text', '工程档案管理  ->  https://ztq.uk/archive.html'],
      ['out-text', 'X / Twitter   ->  https://x.com/'],
    ],
    visitors: () => {
      const pad = String(_visitors).padStart(4, '0');
      const ts  = new Date().toISOString().slice(0,19).replace('T',' ') + ' UTC';
      return [
        ['visitor-text', 'visitor_count  = ' + pad],
        ['visitor-text', 'session_start  = ' + ts],
        ['visitor-text', 'status         = [ online ]'],
      ];
    },
    help: () => { _renderHelp(); return null; },
    theme: () => {
      document.body.classList.toggle('light');
      const m = document.body.classList.contains('light') ? 'light' : 'dark';
      localStorage.setItem('ztq-theme', m);
      return [['out-text', 'Theme: ' + m + ' mode activated.']];
    },
    'theme --light': () => {
      document.body.classList.add('light');
      localStorage.setItem('ztq-theme', 'light');
      return [['out-text', 'Theme: light mode activated.']];
    },
    'theme --dark':  () => {
      document.body.classList.remove('light');
      localStorage.setItem('ztq-theme', 'dark');
      return [['out-text', 'Theme: dark mode activated.']];
    },
    clear: () => {
      document.querySelectorAll('#termBody .tline:not([data-initial])').forEach(el => el.remove());
      return null;
    },
    reborn: () => { setTimeout(triggerReborn, 300); return [['out-text', 'Access granted. Initiating...']]; },
  };

  function _renderHelp() {
    const termBody = document.getElementById('termBody');
    const cursorDiv = termBody.querySelector('.cursor-line');
    const row = document.createElement('div');
    row.className = 'tline';
    row.style.opacity = '1';
    const grid = document.createElement('div');
    grid.className = 'help-grid';
    [
      ['whoami',      'print user info'],
      ['status',      'current status'],
      ['ls skills/',  'list skills'],
      ['links',       'show active links'],
      ['visitors',    'show visitor count'],
      ['theme',       'toggle light / dark mode'],
      ['clear',       'clear terminal'],
      ['reborn',      '???'],
    ].forEach(([cmd, desc]) => {
      const c = document.createElement('span'); c.className = 'help-cmd'; c.textContent = cmd;
      const d = document.createElement('span'); d.className = 'help-desc'; d.textContent = '# ' + desc;
      grid.appendChild(c); grid.appendChild(d);
    });
    row.appendChild(grid);
    if (cursorDiv && cursorDiv.parentNode === termBody) termBody.insertBefore(row, cursorDiv);
    else termBody.appendChild(row);
  }

  /* ═══════════════════════════════════════════════
     7. PROCESS COMMAND
  ═══════════════════════════════════════════════ */
  function processCommand(val, cursorDiv, inputEl, resetIdle) {
    const termEl   = document.getElementById('terminalEl');
    const termBody = document.getElementById('termBody');
    if (!val) { resetIdle(); return; }

    // history
    if (_history[_history.length - 1] !== val) { _history.push(val); if (_history.length > 60) _history.shift(); }
    _histIdx = -1;

    // echo
    const echo = document.createElement('div');
    echo.className = 'tline'; echo.style.opacity = '1';
    echo.innerHTML = `<span class="prompt">#</span> <span class="cmd-text">${escapeHtml(val)}</span>`;
    if (cursorDiv && cursorDiv.parentNode === termBody) termBody.insertBefore(echo, cursorDiv);
    else termBody.appendChild(echo);

    const handler = COMMANDS[val] ?? COMMANDS[val.split(' ')[0]] ?? null;
    if (handler) {
      const result = handler();
      if (result) typeLines(result, termBody, cursorDiv, 16);
    } else {
      // unknown — shake + typewriter error
      termEl.classList.add('shake');
      setTimeout(() => termEl.classList.remove('shake'), 420);
      const errRow = document.createElement('div');
      errRow.className = 'tline'; errRow.style.opacity = '1';
      const errSpan = document.createElement('span'); errSpan.style.color = 'var(--red)';
      errRow.appendChild(errSpan);
      if (cursorDiv && cursorDiv.parentNode === termBody) termBody.insertBefore(errRow, cursorDiv);
      else termBody.appendChild(errRow);
      typeInto(errSpan, `command not found: ${val}. try 'help'`, 16);
    }

    inputEl.value = '';
    resetIdle();
    termBody.scrollTop = termBody.scrollHeight;
  }

  /* ═══════════════════════════════════════════════
     8. INITIAL TERMINAL RENDER  (typewriter)
  ═══════════════════════════════════════════════ */
  window.addEventListener('DOMContentLoaded', () => {
    const termBody = document.getElementById('termBody');
    // wait for boot to finish if it's playing
    const delay = _bootPlaying ? 3100 : 300;

    setTimeout(() => {
      let idx = 0;
      function renderNext() {
        if (idx >= termLines.length) return;
        const line = termLines[idx++];
        const el = document.createElement('div');
        el.className = 'tline';
        el.style.opacity = '1';
        el.dataset.initial = 'true';
        termBody.appendChild(el);

        if (line.type === 'empty') {
          el.classList.add('empty');
          setTimeout(renderNext, 55);

        } else if (line.type === 'cmd') {
          const prompt = document.createElement('span'); prompt.className = 'prompt'; prompt.textContent = '#';
          const sp = document.createElement('span'); sp.className = 'cmd-text';
          el.appendChild(prompt); el.appendChild(document.createTextNode(' ')); el.appendChild(sp);
          typeInto(sp, line.text, 40, renderNext);

        } else if (line.type === 'out') {
          const sp = document.createElement('span'); sp.className = 'out-text';
          el.appendChild(sp);
          typeInto(sp, line.text, 18, renderNext);

        } else if (line.type === 'cursor') {
          el.innerHTML = `<span class="prompt">#</span> <span class="typewriter"></span>`;
          el.classList.add('cursor-line'); el.style.cursor = 'text';
          const tw = el.querySelector('.typewriter');
          const twAnim = startTypewriter(tw);
          const activate = () => activateInput(el, tw, twAnim);
          el.addEventListener('click', activate, { once: true });
          el.addEventListener('touchstart', activate, { once: true, passive: true });
          document.querySelector('.terminal').addEventListener('click', activate, { once: true });
          document.querySelector('.terminal').addEventListener('touchstart', activate, { once: true, passive: true });
        }
      }
      renderNext();
    }, delay);
  });

  /* ═══════════════════════════════════════════════
     9. INPUT ACTIVATION  (click to type)
  ═══════════════════════════════════════════════ */
  function activateInput(el, tw, twAnim) {
    if (twAnim) { twAnim.stopped = true; clearTimeout(twAnim.timer); }
    const inputEl = document.createElement('input');
    inputEl.type = 'text'; inputEl.className = 'term-input';
    inputEl.setAttribute('autocomplete','off'); inputEl.setAttribute('spellcheck','false');
    inputEl.setAttribute('autocorrect','off');  inputEl.setAttribute('autocapitalize','off');
    el.style.cursor = 'default';
    tw.replaceWith(inputEl);
    inputEl.focus();

    let idleTimer = null;
    function resetIdle() {
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => {
        const newTw = document.createElement('span'); newTw.className = 'typewriter';
        inputEl.replaceWith(newTw); el.style.cursor = 'text';
        const newAnim = startTypewriter(newTw);
        const reactivate = () => activateInput(el, newTw, newAnim);
        el.addEventListener('click', reactivate, { once: true });
        el.addEventListener('touchstart', reactivate, { once: true, passive: true });
        document.querySelector('.terminal').addEventListener('click', reactivate, { once: true });
        document.querySelector('.terminal').addEventListener('touchstart', reactivate, { once: true, passive: true });
      }, 10000);
    }
    inputEl.addEventListener('input', resetIdle);
    inputEl.addEventListener('focus', resetIdle);
    resetIdle();

    inputEl.addEventListener('keydown', e => {
      clearTimeout(idleTimer);
      if (e.key === 'Tab') {
        e.preventDefault();
        const partial = inputEl.value.toLowerCase();
        if (!partial) return;
        const allCmds = Object.keys(COMMANDS);
        const match = allCmds.find(k => k.startsWith(partial));
        if (match) {
          inputEl.value = match;
          requestAnimationFrame(() => inputEl.setSelectionRange(match.length, match.length));
        }
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (!_history.length) return;
        if (_histIdx === -1) _histIdx = _history.length - 1; else if (_histIdx > 0) _histIdx--;
        inputEl.value = _history[_histIdx];
        requestAnimationFrame(() => inputEl.setSelectionRange(inputEl.value.length, inputEl.value.length));
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (_histIdx === -1) return;
        _histIdx++;
        inputEl.value = _histIdx >= _history.length ? (_histIdx = -1, '') : _history[_histIdx];
      } else if (e.key === 'Enter') {
        processCommand(inputEl.value.trim().toLowerCase(), el, inputEl, resetIdle);
      }
    });
  }

  /* ═══════════════════════════════════════════════
     10. UTILITIES
  ═══════════════════════════════════════════════ */
  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function startTypewriter(tw) {
    const hints = ["type 'help' to explore...", "try: whoami", "try: links", "try: theme", "try: visitors"];
    let hi = 0, ci = 0, deleting = false;
    const handle = { timer: null, stopped: false };
    function loop() {
      if (handle.stopped) return;
      const word = hints[hi % hints.length];
      if (!deleting) {
        tw.textContent = word.slice(0, ++ci);
        if (ci >= word.length) { deleting = true; handle.timer = setTimeout(loop, 1400); return; }
      } else {
        tw.textContent = word.slice(0, --ci);
        if (ci === 0) { deleting = false; hi++; handle.timer = setTimeout(loop, 400); return; }
      }
      handle.timer = setTimeout(loop, deleting ? 35 : 55);
    }
    handle.timer = setTimeout(loop, 600);
    return handle;
  }

  /* ═══════════════════════════════════════════════
     11. REBORN OVERLAY
  ═══════════════════════════════════════════════ */
  function triggerReborn() {
    const overlay = document.getElementById('redirectOverlay');
    const body    = document.getElementById('redirectBody');
    body.innerHTML = '';
    overlay.classList.add('active');

    const lines = [
      { delay: 0,    cls: 'prompt',    text: '# reborn --init' },
      { delay: 400,  cls: 'out-text',  text: 'Reloading identity matrix...' },
      { delay: 900,  cls: 'green-text',text: '[  OK  ] Ego dissolved.' },
      { delay: 1400, cls: 'green-text',text: '[  OK  ] New self loaded.' },
      { delay: 1900, cls: 'out-text',  text: 'Welcome to the other side.' },
    ];

    lines.forEach(({ delay, cls, text }) => {
      setTimeout(() => {
        const row = document.createElement('div');
        row.className = 'rline';
        row.style.opacity = '1';
        const span = document.createElement('span');
        span.className = cls;
        span.textContent = text;
        row.appendChild(span);
        body.appendChild(row);
      }, delay);
    });

    // 点击任意处或按 Escape 关闭
    setTimeout(() => {
      const close = () => overlay.classList.remove('active');
      overlay.addEventListener('click', close, { once: true });
      const escHandler = e => { if (e.key === 'Escape') { close(); document.removeEventListener('keydown', escHandler); } };
      document.addEventListener('keydown', escHandler);
    }, 2200);
  }

  /* ═══════════════════════════════════════════════
     12. MAGNETIC LINK BUTTONS
  ═══════════════════════════════════════════════ */
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.link-btn').forEach(btn => {
      btn.addEventListener('mousemove', e => {
        const r = btn.getBoundingClientRect();
        btn.style.transform = `translate(${(e.clientX - r.left - r.width/2) / (r.width/2) * 3}px, ${(e.clientY - r.top - r.height/2) / (r.height/2) * 2}px)`;
      });
      btn.addEventListener('mouseleave', () => btn.style.transform = '');
    });
  });
</script>
</body>
