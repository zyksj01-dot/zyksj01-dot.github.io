<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>#define ztq_</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0e1117;
      --surface:  #161b22;
      --surface2: #1c2128;
      --border:   #30363d;
      --green:    #3fb950;
      --blue:     #58a6ff;
      --purple:   #bc8cff;
      --muted:    #6e7681;
      --text:     #c9d1d9;
      --bright:   #f0f6fc;
      --red:      #ff7b72;
      --yellow:   #d29922;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 3rem;
      border-bottom: 1px solid var(--border);
    }

    .nav-left {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .nav-left span { color: var(--blue); }

    .nav-badge {
      font-size: 0.72rem;
      color: var(--green);
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 0.3rem 0.75rem;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .nav-badge::before { content: '>'; }

    main {
      flex: 1;
      padding: 4rem 3rem 3rem;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    /* HERO */
    .hero { display: flex; flex-direction: column; gap: 1rem; }

    .hero-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      animation: fadeup 0.6s ease 0.1s forwards;
    }

    .dollar {
      font-size: clamp(2rem, 5.5vw, 3.8rem);
      font-weight: 300;
      color: var(--blue);
      line-height: 1;
      user-select: none;
      opacity: 0.85;
      letter-spacing: -0.03em;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.8rem);
      font-weight: 700;
      line-height: 1;
      color: var(--bright);
      letter-spacing: -0.02em;
    }

    h1 .blue { color: var(--blue); }

    .zh {
      font-family: 'SimSun', '宋体', 'NSimSun', serif;
      font-weight: 400;
      letter-spacing: 0.05em;
    }

    .title-underscore {
      color: var(--muted);
    }

    .define {
      color: var(--purple);
      font-weight: 300;
      font-size: 0.45em;
      letter-spacing: 0.05em;
      vertical-align: middle;
      margin-right: 0.3em;
      opacity: 0.85;
    }

    .title-cursor {
      display: inline-block;
      width: 0.45em;
      height: 0.85em;
      background: var(--green);
      vertical-align: baseline;
      position: relative;
      top: 0.08em;
      margin-left: 0.08em;
      border-radius: 2px;
      animation: blink 1.1s step-end infinite;
    }

    .hero-sub {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      opacity: 0;
      animation: fadeup 0.6s ease 0.25s forwards;
    }

    .hero-sub::before {
      content: '';
      display: block;
      width: 3px;
      height: 1.4em;
      background: var(--purple);
      border-radius: 2px;
      flex-shrink: 0;
    }

    .hero-sub p {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: var(--muted);
      font-style: italic;
      font-weight: 300;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      opacity: 0;
      animation: fadeup 0.5s ease 0.4s forwards;
      margin-top: calc(-3rem + 0.6rem);
    }

    /* CONNECT */
    .connect {
      opacity: 0;
      animation: fadeup 0.6s ease 0.85s forwards;
    }

    .section-label {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-label::before { content: '>'; }

    .link-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.1rem;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      text-decoration: none;
      border-radius: 6px;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .link-btn .bracket { color: var(--blue); }

    .link-btn:hover {
      border-color: var(--blue);
      color: var(--bright);
      background: var(--surface2);
    }

    .link-btn .arrow {
      transition: transform 0.2s;
      color: var(--muted);
      font-size: 0.85em;
    }

    .link-btn:hover .arrow {
      transform: translateX(3px);
      color: var(--blue);
    }

    /* TERMINAL */
    .terminal-wrap {
      opacity: 0;
      animation: fadeup 0.6s ease 0.65s forwards;
    }

    .terminal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .term-bar {
      display: flex;
      align-items: center;
      padding: 0.75rem 1rem;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .term-dots { display: flex; gap: 6px; }
    .term-dot { width: 12px; height: 12px; border-radius: 50%; }
    .td-r { background: #ff5f57; }
    .td-y { background: #febc2e; }
    .td-g { background: #28c840; }

    .term-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      color: var(--muted);
    }

    .term-body {
      padding: 1.4rem 1.6rem;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .tline {
      font-size: 0.82rem;
      line-height: 1.8;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .tline.cursor-line {
      display: flex;
      align-items: center;
    }

    .tline.empty { min-height: 0.9em; }

    .prompt { color: var(--green); margin-right: 0.5rem; }
    .cmd-text { color: var(--bright); font-weight: 500; }
    .out-text { color: var(--text); }

    /* INPUT LINE */
    .input-line {
      display: flex;
      align-items: center;
      font-size: 0.82rem;
      line-height: 1.8;
      margin-top: 0;
    }

    .term-input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--bright);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      caret-color: var(--green);
      width: 100%;
      flex: 1;
    }

    /* REDIRECT OVERLAY */
    .redirect-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .redirect-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .redirect-terminal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      width: min(480px, 90vw);
    }

    .redirect-bar {
      display: flex;
      align-items: center;
      padding: 0.75rem 1rem;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .redirect-body {
      padding: 1.4rem 1.6rem;
      display: flex;
      flex-direction: column;
      gap: 0;
      min-height: 120px;
    }

    .rline {
      font-size: 0.82rem;
      line-height: 1.8;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .rline .prompt { color: var(--green); margin-right: 0.5rem; }
    .rline .cmd-text { color: var(--bright); font-weight: 500; }
    .rline .out-text { color: var(--text); }
    .rline .green-text { color: var(--green); }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.2rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0;
      animation: fadeup 0.5s ease 1.2s forwards;
    }

    .foot-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .foot-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2.4s ease-in-out infinite;
    }

    footer .right { font-size: 0.72rem; color: var(--muted); }

    .typewriter {
      color: var(--muted);
    }

    @keyframes fadeup {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadein { to { opacity: 1; } }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0; }
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.65); }
    }

    @media (max-width: 540px) {
      nav, footer { padding-left: 1.5rem; padding-right: 1.5rem; }
      main { padding: 2.5rem 1.5rem; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-left"><span>//</span> Personal</div>
    <div class="nav-badge">Est. 2026 — Ongoing</div>
  </nav>

  <main>
    <div class="hero">
      <div class="hero-title">
        <h1><span class="define">#define</span> ztq<span class="title-underscore">_</span><span class="title-cursor"></span></h1>
      </div>
      <div class="hero-sub">
        <p>Reborn At 36.</p>
      </div>
    </div>

    <hr>

    <div class="terminal-wrap">
      <div class="terminal">
        <div class="term-bar">
          <div class="term-dots">
            <div class="term-dot td-r"></div>
            <div class="term-dot td-y"></div>
            <div class="term-dot td-g"></div>
          </div>
          <div class="term-title">ztq@reborn ~ </div>
        </div>
        <div class="term-body" id="termBody"></div>
      </div>
    </div>

    <div class="connect">
      <div class="section-label">Connect</div>
      <div class="link-grid">
        <a class="link-btn" href="https://ztq.uk/calculator.html" target="_blank" aria-label="片区经济测算">
          <span class="bracket">[</span><span class="zh">片区经济测算</span><span class="bracket">]</span>
          <span class="arrow">→</span>
        </a>
        <a class="link-btn" href="https://ztq.uk/archive.html" target="_blank">
          <span class="bracket">[</span><span class="zh">工程档案管理</span><span class="bracket">]</span>
          <span class="arrow">→</span>
        </a>
        <a class="link-btn" href="https://x.com/" target="_blank">
          <span class="bracket">[</span>X / Twitter<span class="bracket">]</span>
          <span class="arrow">→</span>
        </a>
        <a class="link-btn" href="/cdn-cgi/l/email-protection#b3cadcc6c1f3d6ded2dadf9dd0dcde">
          <span class="bracket">[</span>Email<span class="bracket">]</span>
          <span class="arrow">→</span>
        </a>
      </div>
    </div>
  </main>

  <footer>
    <div class="foot-left">
      <div class="foot-dot"></div>
      <span>ztq · 2026</span>
    </div>
    <div class="right">code everything</div>
  </footer>

  <!-- REDIRECT OVERLAY -->
  <div class="redirect-overlay" id="redirectOverlay">
    <div class="redirect-terminal">
      <div class="redirect-bar">
        <div class="term-dots">
          <div class="term-dot td-r"></div>
          <div class="term-dot td-y"></div>
          <div class="term-dot td-g"></div>
        </div>
        <div class="term-title" style="position:absolute;left:50%;transform:translateX(-50%);font-size:0.7rem;color:var(--muted);">ztq@reborn ~ </div>
      </div>
      <div class="redirect-body" id="redirectBody"></div>
    </div>
  </div>

<script>
  const termLines = [
    { type: 'cmd', text: 'whoami' },
    { type: 'out', text: 'Ztq - exploring AI, rebuilding at 36.' },
    { type: 'empty' },
    { type: 'cmd', text: 'status' },
    { type: 'out', text: 'Currently: Reborn & learning.' },
    { type: 'out', text: 'Est. 2026 - Ongoing' },
    { type: 'empty' },
    { type: 'cmd', text: 'ls skills/' },
    { type: 'out', text: 'real-estate   archive   AI   rebuilding' },
    { type: 'empty' },
    { type: 'cursor' },
  ];

  // 秘密基地地址，确定后在这里修改
  const SECRET_URL = '#';

  window.addEventListener('DOMContentLoaded', () => {
    const body = document.getElementById('termBody');
    let delay = 900;

    termLines.forEach((line) => {
      const el = document.createElement('div');
      el.className = 'tline';
      el.style.opacity = '0';

      if (line.type === 'cmd') {
        el.innerHTML = `<span class="prompt">#</span> <span class="cmd-text">${line.text}</span>`;
      } else if (line.type === 'out') {
        el.innerHTML = `<span class="out-text">${line.text}</span>`;
      } else if (line.type === 'empty') {
        el.classList.add('empty');
      } else if (line.type === 'cursor') {
        el.innerHTML = `<span class="prompt">#</span> <span class="typewriter"></span>`;
        el.classList.add('cursor-line');
        el.style.cursor = 'text';
      }

      body.appendChild(el);

      const t = delay;
      setTimeout(() => {
        el.style.transition = 'opacity 0.2s ease';
        el.style.opacity = '1';

        if (line.type === 'cursor') {
          const tw = el.querySelector('.typewriter');
          const twAnim = startTypewriter(tw);

          // 点击后切换为输入模式
          el.addEventListener('click', () => activateInput(el, tw, twAnim), { once: true });
          document.querySelector('.terminal').addEventListener('click', () => activateInput(el, tw, twAnim), { once: true });
        }
      }, t);

      if (line.type === 'cmd')        delay += 340;
      else if (line.type === 'out')   delay += 190;
      else if (line.type === 'empty') delay += 80;
      else if (line.type === 'cursor') delay += 200;
    });
  });

  function activateInput(el, tw, twAnim) {
    if (twAnim) { twAnim.stopped = true; clearTimeout(twAnim.timer); }

    // 把 typewriter span 直接替换成 input，保持同一行
    const inputEl = document.createElement('input');
    inputEl.type = 'text';
    inputEl.className = 'term-input';
    inputEl.setAttribute('autocomplete', 'off');
    inputEl.setAttribute('spellcheck', 'false');
    inputEl.setAttribute('autocorrect', 'off');
    inputEl.setAttribute('autocapitalize', 'off');
    el.style.cursor = 'default';
    tw.replaceWith(inputEl);
    inputEl.focus();

    let idleTimer = null;

    function resetIdle() {
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => {
        // 恢复 typewriter
        const newTw = document.createElement('span');
        newTw.className = 'typewriter';
        inputEl.replaceWith(newTw);
        el.style.cursor = 'text';
        const newAnim = startTypewriter(newTw);
        el.addEventListener('click', () => activateInput(el, newTw, newAnim), { once: true });
        document.querySelector('.terminal').addEventListener('click', () => activateInput(el, newTw, newAnim), { once: true });
      }, 5000);
    }

    inputEl.addEventListener('input', resetIdle);
    inputEl.addEventListener('focus', resetIdle);
    resetIdle();

    inputEl.addEventListener('keydown', (e) => {
      clearTimeout(idleTimer);
      if (e.key === 'Enter') {
        const val = inputEl.value.trim().toLowerCase();
        if (val === 'reborn') {
          inputEl.blur();
          triggerReborn();
        } else if (val !== '') {
          inputEl.style.color = 'var(--red)';
          setTimeout(() => { inputEl.style.color = ''; inputEl.value = ''; resetIdle(); }, 600);
        }
      }
    });
  }

  function startTypewriter(tw) {
    const text = 'waiting for input...';
    let index = 0;
    let deleting = false;
    const handle = { timer: null, stopped: false };

    function loop() {
      if (handle.stopped) return;
      if (!deleting) {
        tw.textContent = text.slice(0, index + 1);
        index++;
        if (index === text.length) {
          deleting = true;
          handle.timer = setTimeout(loop, 1800);
          return;
        }
        handle.timer = setTimeout(loop, 80);
      } else {
        tw.textContent = text.slice(0, index - 1);
        index--;
        if (index === 0) {
          deleting = false;
          handle.timer = setTimeout(loop, 600);
          return;
        }
        handle.timer = setTimeout(loop, 40);
      }
    }
    handle.timer = setTimeout(loop, 300);
    return handle;
  }

  function triggerReborn() {
    const overlay = document.getElementById('redirectOverlay');
    const rbody   = document.getElementById('redirectBody');

    overlay.classList.add('active');

    const lines = [
      { text: 'reborn', type: 'cmd' },
      { text: 'Initiating...', type: 'out' },
      { text: 'Access granted.', type: 'green' },
      { text: 'Redirecting to base...', type: 'out' },
    ];

    let d = 100;
    lines.forEach((l, i) => {
      const el = document.createElement('div');
      el.className = 'rline';

      if (l.type === 'cmd') {
        el.innerHTML = `<span class="prompt">#</span> <span class="cmd-text">${l.text}</span>`;
      } else if (l.type === 'green') {
        el.innerHTML = `<span class="green-text">${l.text}</span>`;
      } else {
        el.innerHTML = `<span class="out-text">${l.text}</span>`;
      }

      rbody.appendChild(el);

      setTimeout(() => {
        el.style.opacity = '1';
      }, d);

      d += 420;
    });

    // 跳转
    setTimeout(() => {
      window.location.href = SECRET_URL;
    }, d + 300);
  }
</script>
</body>
</html>
