<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZtqWithAi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0e1117;
      --surface:  #161b22;
      --surface2: #1c2128;
      --border:   #30363d;
      --green:    #3fb950;
      --blue:     #58a6ff;
      --purple:   #bc8cff;
      --muted:    #6e7681;
      --text:     #c9d1d9;
      --bright:   #f0f6fc;
      --red:      #ff7b72;
      --yellow:   #d29922;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 3rem;
      border-bottom: 1px solid var(--border);
    }

    .nav-left {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .nav-left span { color: var(--blue); }

    .nav-badge {
      font-size: 0.72rem;
      color: var(--green);
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 0.3rem 0.75rem;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .nav-badge::before { content: '>'; }

    main {
      flex: 1;
      padding: 4rem 3rem 3rem;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    /* HERO */
    .hero { display: flex; flex-direction: column; gap: 1rem; }

    .hero-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      animation: fadeup 0.6s ease 0.1s forwards;
    }

    .dollar {
      font-size: clamp(2rem, 5.5vw, 3.8rem);
      font-weight: 300;
      color: var(--blue);
      line-height: 1;
      user-select: none;
      opacity: 0.85;
      letter-spacing: -0.03em;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.8rem);
      font-weight: 700;
      line-height: 1;
      color: var(--bright);
      letter-spacing: -0.02em;
    }

    h1 .blue { color: var(--blue); }

    .zh {
      font-family: 'SimSun', '宋体', 'NSimSun', serif;
      font-weight: 400;
      letter-spacing: 0.05em;
    }

    .title-underscore {
      color: var(--muted);
    }

    .define {
      color: var(--purple);
      font-weight: 300;
      font-size: 0.45em;
      letter-spacing: 0.05em;
      vertical-align: middle;
      margin-right: 0.3em;
      opacity: 0.85;
    }

    .title-cursor {
      display: inline-block;
      width: 0.45em;
      height: 0.85em;
      background: var(--green);
      vertical-align: text-bottom;
      margin-left: 0.08em;
      border-radius: 2px;
      animation: blink 1.1s step-end infinite;
    }

    .hero-sub {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      opacity: 0;
      animation: fadeup 0.6s ease 0.25s forwards;
    }

    .hero-sub::before {
      content: '';
      display: block;
      width: 3px;
      height: 1.4em;
      background: var(--purple);
      border-radius: 2px;
      flex-shrink: 0;
    }

    .hero-sub p {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: var(--muted);
      font-style: italic;
      font-weight: 300;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      opacity: 0;
      animation: fadeup 0.5s ease 0.4s forwards;
    }

    /* CONNECT */
    .connect {
      opacity: 0;
      animation: fadeup 0.6s ease 0.5s forwards;
    }

    .section-label {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-label::before { content: '>'; }

    .link-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.1rem;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      text-decoration: none;
      border-radius: 6px;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .link-btn .bracket { color: var(--blue); }

    .link-btn:hover {
      border-color: var(--blue);
      color: var(--bright);
      background: var(--surface2);
    }

    .link-btn .arrow {
      transition: transform 0.2s;
      color: var(--muted);
      font-size: 0.85em;
    }

    .link-btn:hover .arrow {
      transform: translateX(3px);
      color: var(--blue);
    }

    /* TERMINAL */
    .terminal-wrap {
      opacity: 0;
      animation: fadeup 0.6s ease 0.65s forwards;
    }

    .terminal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .term-bar {
      display: flex;
      align-items: center;
      padding: 0.75rem 1rem;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .term-dots { display: flex; gap: 6px; }
    .term-dot { width: 12px; height: 12px; border-radius: 50%; }
    .td-r { background: #ff5f57; }
    .td-y { background: #febc2e; }
    .td-g { background: #28c840; }

    .term-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      color: var(--muted);
    }

    .term-body {
      padding: 1.4rem 1.6rem;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .tline {
      font-size: 0.82rem;
      line-height: 1.8;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .tline.empty { min-height: 0.9em; }

    .prompt { color: var(--green); margin-right: 0.5rem; }
    .cmd-text { color: var(--bright); font-weight: 500; }
    .out-text { color: var(--text); }

    .tcursor {
      display: inline-block;
      width: 8px;
      height: 1em;
      background: var(--green);
      vertical-align: text-bottom;
      margin-left: 2px;
      border-radius: 1px;
      animation: blink 1.1s step-end infinite;
    }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.2rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0;
      animation: fadeup 0.5s ease 1.2s forwards;
    }

    .foot-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .foot-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2.4s ease-in-out infinite;
    }

    footer .right { font-size: 0.72rem; color: var(--muted); }

    .typewriter {
      color: var(--muted);
    }

    @keyframes fadeup {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadein { to { opacity: 1; } }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0; }
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.65); }
    }

    @media (max-width: 540px) {
      nav, footer { padding-left: 1.5rem; padding-right: 1.5rem; }
      main { padding: 2.5rem 1.5rem; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-left"><span>//</span> Personal</div>
    <div class="nav-badge">Est. 2026 — Ongoing</div>
  </nav>

  <main>
    <div class="hero">
      <div class="hero-title">
        <h1><span class="define">#define</span> ztq<span class="title-underscore">_</span><span class="title-cursor"></span></h1>
      </div>
      <div class="hero-sub">
        <p>Reborn At 36.</p>
      </div>
    </div>

    <hr>

    <div class="connect">
      <div class="section-label">Connect</div>
      <div class="link-grid">
        <a class="link-btn" href="https://ztq.uk/calculator.html" target="_blank">
          <span class="bracket">[</span><span class="zh">片区测算工具</span><span class="bracket">]</span>
          <span class="arrow">→</span>
        </a>
        <a class="link-btn" href="https://ztq.uk/archive.html" target="_blank">
          <span class="bracket">[</span><span class="zh">工程档案管理</span><span class="bracket">]</span>
          <span class="arrow">→</span>
        </a>
        <a class="link-btn" href="https://x.com/" target="_blank">
          <span class="bracket">[</span>X / Twitter<span class="bracket">]</span>
          <span class="arrow">→</span>
        </a>
        <a class="link-btn" href="/cdn-cgi/l/email-protection#b3cadcc6c1f3d6ded2dadf9dd0dcde">
          <span class="bracket">[</span>Email<span class="bracket">]</span>
          <span class="arrow">→</span>
        </a>
      </div>
    </div>

    <div class="terminal-wrap">
      <div class="terminal">
        <div class="term-bar">
          <div class="term-dots">
            <div class="term-dot td-r"></div>
            <div class="term-dot td-y"></div>
            <div class="term-dot td-g"></div>
          </div>
          <div class="term-title">ztq@reborn ~ </div>
        </div>
        <div class="term-body" id="termBody"></div>
      </div>
    </div>
  </main>

  <footer>
    <div class="foot-left">
      <div class="foot-dot"></div>
      <span>ZtqWithAi · 2026</span>
    </div>
    <div class="right">Made with AI</div>
  </footer>

<script>
  const termLines = [
    { type: 'cmd', text: 'whoami' },
    { type: 'out', text: 'Ztq - exploring AI, rebuilding at 36.' },
    { type: 'empty' },
    { type: 'cmd', text: 'status' },
    { type: 'out', text: 'Currently: Reborn & learning.' },
    { type: 'out', text: 'Est. 2026 - Ongoing' },
    { type: 'empty' },
    { type: 'cmd', text: 'ls skills/' },
    { type: 'out', text: 'AI   building   shipping   growing' },
    { type: 'empty' },
    { type: 'cursor' },
  ];

  window.addEventListener('DOMContentLoaded', () => {
    const body = document.getElementById('termBody');
    let delay = 900;

    termLines.forEach((line) => {
      const el = document.createElement('div');
      el.className = 'tline';
      el.style.opacity = '0';

      if (line.type === 'cmd') {
        el.innerHTML = `<span class="prompt">#</span> <span class="cmd-text">${line.text}</span>`;
      } else if (line.type === 'out') {
        el.innerHTML = `<span class="out-text">${line.text}</span>`;
      } else if (line.type === 'empty') {
        el.classList.add('empty');
      } else if (line.type === 'cursor') {
        el.innerHTML = `<span class="prompt">#</span> <span class="typewriter"></span>`;
      }

      body.appendChild(el);

      const t = delay;
      setTimeout(() => {
        el.style.transition = 'opacity 0.2s ease';
        el.style.opacity = '1';

        // start typewriter after cursor line appears
        if (line.type === 'cursor') {
          const tw = el.querySelector('.typewriter');
          startTypewriter(tw);
        }
      }, t);

      if (line.type === 'cmd')         delay += 340;
      else if (line.type === 'out')    delay += 190;
      else if (line.type === 'empty')  delay += 80;
      else if (line.type === 'cursor') delay += 200;
    });
  });

  function startTypewriter(tw) {
    const text = 'waiting for input...';
    let index = 0;
    let deleting = false;

    function loop() {
      if (!deleting) {
        tw.textContent = text.slice(0, index + 1);
        index++;
        if (index === text.length) {
          deleting = true;
          setTimeout(loop, 1800);
          return;
        }
        setTimeout(loop, 80);
      } else {
        tw.textContent = text.slice(0, index - 1);
        index--;
        if (index === 0) {
          deleting = false;
          setTimeout(loop, 600);
          return;
        }
        setTimeout(loop, 40);
      }
    }
    setTimeout(loop, 300);
  }
</script>
</body>
</html>
