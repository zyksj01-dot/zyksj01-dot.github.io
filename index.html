<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZtqWithAi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2ec;
      --ink: #1a1810;
      --muted: #9a9488;
      --accent: #c8a96e;
      --line: rgba(26,24,16,0.12);
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.5;
    }

    /* Layout */
    main {
      flex: 1;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: clamp(2rem, 8vw, 6rem);
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    /* Hero */
    .hero {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-top: clamp(4rem, 15vh, 10rem);
      opacity: 0;
      transform: translateY(24px);
      animation: rise 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.8rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .eyebrow::before {
      content: '';
      display: block;
      width: 2rem;
      height: 1px;
      background: var(--accent);
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(3.5rem, 10vw, 8rem);
      line-height: 0.95;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 2rem;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .tagline {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      color: var(--muted);
      margin-bottom: 3.5rem;
      max-width: 38ch;
      line-height: 1.5;
    }

    /* Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: var(--line);
      margin: 3rem 0;
      opacity: 0;
      animation: rise 0.8s ease 0.8s forwards;
    }

    /* Links row */
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 2rem;
      opacity: 0;
      animation: rise 0.8s ease 1s forwards;
    }

    .links a {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.2s ease;
      padding: 0.4rem 0;
      border-bottom: 1px solid transparent;
    }

    .links a:hover {
      color: var(--ink);
      border-bottom-color: var(--accent);
    }

    .links a .arrow {
      transition: transform 0.2s ease;
      font-size: 0.8em;
    }

    .links a:hover .arrow {
      transform: translateX(3px);
    }

    /* Footer */
    footer {
      padding: clamp(1.5rem, 4vw, 3rem) clamp(2rem, 8vw, 6rem);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--line);
      opacity: 0;
      animation: rise 0.8s ease 1.2s forwards;
    }

    footer span {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2.5s ease-in-out infinite;
    }

    /* Year marker */
    .year-mark {
      position: fixed;
      right: clamp(1rem, 3vw, 2.5rem);
      top: 50%;
      transform: translateY(-50%) rotate(90deg);
      transform-origin: center;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--line);
      white-space: nowrap;
      user-select: none;
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    @media (max-width: 480px) {
      .year-mark { display: none; }
      footer { flex-direction: column; gap: 1rem; }
    }
  </style>
</head>
<body>

  <div class="year-mark">Est. 2025 — Ongoing</div>

  <main>
    <section class="hero">
      <p class="eyebrow">Personal</p>
      <h1>Ztq<em>With</em><br>Ai</h1>
      <p class="tagline">Reborn At 36.</p>

      <div class="divider"></div>

      <nav class="links">
        <a href="https://github.com/" target="_blank">GitHub <span class="arrow">→</span></a>
        <a href="https://x.com/" target="_blank">X / Twitter <span class="arrow">→</span></a>
        <a href="mailto:your@email.com">Email <span class="arrow">→</span></a>
      </nav>
    </section>
  </main>

  <footer>
    <span>ZtqWithAi · 2025</span>
    <div class="dot"></div>
    <span>Made with AI</span>
  </footer>

</body>
</html>
